services:
  - type: web
    name: sistema-matematica
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash -c "cd flask_migration && gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
    disk:
      name: dados
      mountPath: /opt/render/project/src/dados
      sizeGB: 1
